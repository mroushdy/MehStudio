<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<title>MEH Studio v5 — print-only multiple-entry horn designer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--paper:#FFFFFF;--panel:#FAFAFA;--ink:#1C1C1C;--faint:#A6A6A6;--grid:#F0F0F0;--gridmaj:#E2E2E2;--acc:#C8331D;--line:#E8E8E8;--ok:#4a7a3a;--warn:#a07d1e;--bad:#C8331D;--mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;}
#app{min-height:100vh;padding:16px;}
.frame{border:1px solid var(--gridmaj);max-width:1400px;margin:0 auto;background:var(--paper);}
header{display:flex;flex-wrap:nowrap;border-bottom:1px solid var(--gridmaj);align-items:center;min-width:0;}
.ttl{padding:14px 20px;flex:1 1 300px;min-width:0;}
.eyebrow{font-size:9px;letter-spacing:.22em;color:var(--faint);margin-bottom:4px;text-transform:uppercase;}
h1{margin:0;font-weight:600;font-size:18px;letter-spacing:.04em;}
h1 .acc{color:var(--ink);}
.brand{margin-left:auto;padding:10px 20px;text-align:right;flex:0 0 auto;white-space:nowrap;font-size:9px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase;line-height:1.7;}
.cols{display:flex;flex-wrap:wrap;}
aside{flex:0 0 268px;min-width:244px;padding:14px 16px 12px;border-right:1px solid var(--line);background:var(--panel);position:sticky;top:0;max-height:100vh;overflow-y:auto;align-self:flex-start;}
@media (max-width:900px){ aside{position:static;max-height:none;flex:1 1 100%;border-right:none;border-bottom:1px solid var(--line);} }
main.viewcol{flex:1 1 460px;min-width:300px;}
.sect{font-size:9px;letter-spacing:.2em;color:var(--faint);margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--line);text-transform:uppercase;}
.sect:first-child{margin-top:0;padding-top:0;border-top:none;}
.seg{display:flex;gap:0;margin-bottom:10px;border:1px solid var(--line);}
.seg button{flex:1;background:var(--paper);border:none;border-right:1px solid var(--line);color:var(--ink);padding:7px 2px;font-family:var(--mono);font-weight:600;font-size:10px;letter-spacing:.06em;cursor:pointer;}
.seg button:last-child{border-right:none;}
.seg button.on{background:var(--ink);color:#fff;}
label{display:block;color:var(--faint);font-size:10px;letter-spacing:.06em;margin-top:10px;text-transform:uppercase;}
.val{float:right;color:var(--ink);font-size:11px;}
input[type=range]{width:100%;accent-color:var(--ink);height:2px;}
select{width:100%;font-family:var(--mono);font-size:11px;background:var(--paper);border:1px solid var(--line);color:var(--ink);padding:5px 6px;margin-top:3px;}
#v3dwrap{position:relative;min-height:520px;}
#v3d{position:absolute;inset:0;}
#hud{position:absolute;left:12px;top:12px;z-index:3;display:flex;flex-direction:column;gap:6px;}
#hud button{background:#FFFFFFee;border:1px solid var(--gridmaj);color:var(--ink);padding:6px 10px;font-family:var(--mono);font-weight:600;font-size:9px;cursor:pointer;letter-spacing:.14em;text-transform:uppercase;}
#note{position:absolute;left:12px;bottom:10px;color:var(--faint);font-size:10px;z-index:3;}
#dims{position:absolute;right:14px;bottom:10px;color:var(--faint);font-size:10px;z-index:3;letter-spacing:.04em;}
#rows{position:absolute;right:12px;top:12px;z-index:3;background:#FFFFFFee;padding:8px 12px;border:1px solid var(--gridmaj);max-width:340px;}
#rows div{font-size:9.5px;margin:2.5px 0;letter-spacing:.02em;}
.ok{color:var(--ok)}.warn{color:var(--warn)}.fail{color:var(--bad)}
</style></head><body>
<div id="app"><div class="frame">
<header>
  <div class="ttl">
    <div class="eyebrow">multiple-entry horn · print-only · geometry first, crossover derived</div>
    <h1>MEH STUDIO <span class="acc">v5</span> <span style="font-size:10px;color:var(--faint);letter-spacing:.1em">· BUILD <span id="bno"></span></span></h1>
  </div>
  <div class="brand">companion to horn studio<br>silence please · nyc</div>
</header>
<div class="cols">
<aside>
  <div class="sec">TOPOLOGY</div>
  <div class="seg" id="segTopo">
    <button data-v="1way">1-WAY COAX</button><button data-v="2way" class="on">2-WAY</button><button data-v="3way">3-WAY</button>
  </div>
  <div class="sec">FORM</div>
  <div class="seg" id="segStyle">
    <button data-v="smooth" class="on">SMOOTH</button><button data-v="angular">CLASSIC ANGULAR</button>
  </div>
  <label>SHAPE — ROUND ⟷ SQUARE <span class="val" id="vN"></span></label>
  <input type="range" id="seN" min="2" max="12" step="0.5" value="6">
  <label>MOUTH WIDTH [in] <span class="val" id="vMouth"></span></label>
  <input type="range" id="mouthW" min="10" max="64" step="1" value="24">
  <label>COVERAGE H [°] <span class="val" id="vCovH"></span></label>
  <input type="range" id="covH" min="40" max="120" step="5" value="90">
  <label>COVERAGE V [°] <span class="val" id="vCovV"></span></label>
  <input type="range" id="covV" min="30" max="120" step="5" value="60">
  <label>MOUTH ROLL RADIUS [in] <span class="val" id="vRoll"></span></label>
  <input type="range" id="rollR" min="0.5" max="4" step="0.25" value="2">
  <label>PRINT WALL [mm] <span class="val" id="vWall"></span></label>
  <input type="range" id="wallmm" min="6" max="25" step="1" value="12">
  <div class="sec">DRIVERS</div>
  <label>COMPRESSION DRIVER</label>
  <select id="cdSel"><option value="de500">1&Prime; CD (to ~900 Hz)</option><option value="de900" selected>1.4&Prime; CD (to ~550 Hz)</option><option value="dcx464">1.4&Prime; COAX DCX464 (to ~300 Hz)</option></select>
  <label>WOOFER / LOW-MID</label>
  <select id="wPre"></select>
  <label>WOOFER / LOW-MID Ø [cm] <span class="val" id="vOdW"></span></label>
  <input type="range" id="odW" min="8" max="46" step="1" value="14">
  <label>WOOFER COUNT <span class="val" id="vNW"></span></label>
  <input type="range" id="nW" min="2" max="8" step="1" value="6">
  <div id="midCtl" style="display:none">
    <label>MID</label>
    <select id="mPre"></select>
    <label>MID Ø [cm] <span class="val" id="vOdM"></span></label>
    <input type="range" id="odM" min="5" max="16" step="0.5" value="10">
    <label>MID COUNT <span class="val" id="vNM"></span></label>
    <input type="range" id="nM" min="2" max="8" step="1" value="4">
  </div>
</aside>
<main class="viewcol"><div id="v3dwrap">
  <div id="v3d"></div>
  <div id="hud">
    <button id="bPin">PIN A BUG</button>
    <button id="bXray">X-RAY</button>
  </div>
  <div id="rows"></div>
  <div id="note"></div>
  <div id="dims"></div>
</div>
<div id="chartwrap" style="border-top:1px solid var(--gridmaj);padding:10px 14px;background:var(--paper)">
  <div class="sect" style="border-top:none;padding-top:0;margin:0 0 6px">predicted response — sections + LR4 sum at the derived crossovers (per-section normalized)</div>
  <canvas id="respChart" width="1000" height="190" style="width:100%;height:190px;display:block"></canvas>
</div></main>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/*__ENGINE__*/
/*__CAD__*/
window.MEH_BUILD=500;
document.getElementById('bno').textContent=MEH_BUILD;
"use strict";
/* ---------------- driver presets (v4 datasheets; mesh = true CAD, meshApprox = nearest body) ---------------- */
const WPRE={
  w65:{name:'6.5\u2033 woofer', od:16.7, dp:8.5, sd:132, vtc:45, xm:5, meshApprox:'BC_8MDN51'},
  w8:{name:'8\u2033 woofer', od:21.0, dp:10, sd:220, vtc:80, xm:6.5, meshApprox:'BC_8MDN51'},
  mdn8:{name:'B&C 8MDN51 (true CAD)', od:22.0, dp:10.5, sd:232, vtc:85, xm:6, mesh:'BC_8MDN51'},
  hpl10:{name:'B&C 10HPL64 (true CAD)', od:26.1, dp:12.2, sd:330, vtc:130, xm:8, mesh:'BC_10HPL64'},
  ndl12:{name:'B&C 12NDL76 (true CAD)', od:31.5, dp:14, sd:522, vtc:180, xm:9, mesh:'BC_12NDL76'},
  es12:{name:'18Sound 12LW1400 (true CAD)', od:32.2, dp:15, sd:530, vtc:190, xm:9.5, mesh:'ES_12LW1400'},
  w15:{name:'15\u2033 woofer', od:39.0, dp:17, sd:855, vtc:320, xm:10, meshApprox:'BC_18SW115'},
  sw18:{name:'B&C 18SW115 (true CAD)', od:46.0, dp:22, sd:1210, vtc:450, xm:14, mesh:'BC_18SW115'},
  pzb18:{name:'B&C 18PZB100 (true CAD)', od:46.0, dp:20, sd:1150, vtc:420, xm:9, mesh:'BC_18PZB100'}};
const MPRE={
  m3:{name:'3\u2033 mid', od:9.3, dp:6.2, sd:31, vtc:25, xm:2.5, meshApprox:'BC_8MDN51'},
  m4:{name:'4\u2033 mid', od:10.3, dp:6.5, sd:50, vtc:40, xm:3, meshApprox:'BC_8MDN51'},
  bc5:{name:'B&C 5\u2033 sealed', od:15.7, dp:8.2, sd:90, vtc:55, xm:4, meshApprox:'BC_8MDN51'},
  mdn8m:{name:'B&C 8MDN51 (true CAD)', od:22.0, dp:10.5, sd:232, vtc:85, xm:6, mesh:'BC_8MDN51'}};
/* ---------------- state ---------------- */
const S={topo:'2way', style:'smooth', wPre:'w8', mPre:'m4', wallT:0.012, seN:6, covH:90, covV:60, mouthW:24, mouthCap:64, throat:1.4, rollR:2,
  fxHi:900, fxLo:300, cdDepth:1.7, td:1.4, coaxRing:4.5,
  nW:6, odW:14, dpW:7, nM:4, odM:10, dpM:6};
try{ Object.assign(S, JSON.parse(localStorage.getItem('meh5_state')||'{}')); }catch(e){}
{ const P=WPRE[S.wPre]; if(P){S.sdW=P.sd;S.vtcW=P.vtc;S.xmW=P.xm;}
  const Q=MPRE[S.mPre]; if(Q){S.sdM=Q.sd;S.vtcM=Q.vtc;S.xmM=Q.xm;} }
/* ---------------- 3D ---------------- */
const V3D={yaw:0.6,pitch:0.28,dist:1.9,spin:false,xray:false};
function init3d(){
  const host=document.getElementById('v3d');
  V3D.renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
  V3D.renderer.setClearColor(0xFAFAFA);
  host.appendChild(V3D.renderer.domElement);
  V3D.scene=new THREE.Scene();
  V3D.camera=new THREE.PerspectiveCamera(42,1,0.01,50);
  V3D.scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const dl=new THREE.DirectionalLight(0xffffff,0.7); dl.position.set(2,3,1.5); V3D.scene.add(dl);
  const d2=new THREE.DirectionalLight(0xffffff,0.25); d2.position.set(-2,-1,-2); V3D.scene.add(d2);
  V3D.tgt=new THREE.Vector3(0,0,0);
  const cv=V3D.renderer.domElement; let drag=null;
  cv.addEventListener('mousedown',e=>{ if(window.__pinMode) return; drag=[e.clientX,e.clientY];});
  addEventListener('mousemove',e=>{ if(!drag) return;
    V3D.yaw+=(e.clientX-drag[0])*0.008; V3D.pitch=Math.max(-1.4,Math.min(1.4,V3D.pitch+(e.clientY-drag[1])*0.008));
    drag=[e.clientX,e.clientY]; render3d(); });
  addEventListener('mouseup',()=>drag=null);
  cv.addEventListener('wheel',e=>{ e.preventDefault(); V3D.dist=Math.max(0.5,Math.min(4,V3D.dist*(1+e.deltaY*0.001))); render3d(); },{passive:false});
  const size=()=>{ const r=host.getBoundingClientRect();
    V3D.renderer.setSize(r.width,r.height); V3D.camera.aspect=r.width/r.height; V3D.camera.updateProjectionMatrix(); render3d(); };
  addEventListener('resize',size); setTimeout(size,0);
}
function render3d(){
  if(!V3D.renderer) return;
  const b=V3D.bnd||0.6, d=b*V3D.dist*2.2;
  V3D.camera.position.set(V3D.tgt.x+d*Math.cos(V3D.pitch)*Math.cos(V3D.yaw),
                          V3D.tgt.y+d*Math.sin(V3D.pitch),
                          V3D.tgt.z+d*Math.cos(V3D.pitch)*Math.sin(V3D.yaw));
  V3D.camera.lookAt(V3D.tgt);
  V3D.renderer.render(V3D.scene,V3D.camera);
}
/* ---- clean parametric driver silhouettes (outer shapes only, per his call) ---- */
function driverBody(od,dp,PRE){
  const g=new THREE.Group();
  const R=od/2, motor=PRE.motor||'neo';
  const magR=(motor==='ferrite'? 0.44 : 0.30)*od;
  const magL=(motor==='ferrite'? 0.22 : 0.30)*dp;
  const CAST=new THREE.MeshPhongMaterial({color:0xB9B6B0,specular:0x333333,shininess:26,side:THREE.DoubleSide});
  const DARK=new THREE.MeshPhongMaterial({color:0x3A3835,specular:0x222222,shininess:34,side:THREE.DoubleSide});
  const pts=[
    [R*1.00,0.000],[R*1.00,0.006],[R*0.97,0.009],
    [R*0.92,0.012],[R*0.78,dp*0.16],[R*0.60,dp*0.34],
    [R*0.46,dp*0.48],[magR*1.06,dp*0.56],[magR*1.02,dp*0.585]
  ].map(p=>new THREE.Vector2(p[0],p[1]));
  g.add(new THREE.Mesh(new THREE.LatheGeometry(pts,48),CAST));
  const gk=new THREE.Mesh(new THREE.TorusGeometry(R*0.94,R*0.035,10,48),DARK);
  gk.rotation.x=Math.PI/2; gk.position.y=0.002; g.add(gk);
  const mpts=[
    [magR*1.02,dp*0.585],[magR,dp*0.60],[magR,dp*0.60+magL*0.92],
    [magR*0.94,dp*0.60+magL],[magR*0.42,dp*0.60+magL],[magR*0.40,dp*0.60+magL+dp*0.045],
    [0.0001,dp*0.60+magL+dp*0.045]
  ].map(p=>new THREE.Vector2(p[0],p[1]));
  g.add(new THREE.Mesh(new THREE.LatheGeometry(mpts,40),DARK));
  const term=new THREE.Mesh(new THREE.BoxGeometry(od*0.10,dp*0.10,od*0.05),DARK);
  term.position.set(R*0.72,dp*0.30,0); term.rotation.z=0.5; g.add(term);
  return g;
}
/* scene axes: (x,z,y) like v4 — model x = depth axis points at the viewer-front */
const sc=1;
function P3(p){ return new THREE.Vector3(p[0],p[2],p[1]); }
function rebuild(){
  if(V3D.group){ V3D.scene.remove(V3D.group); V3D.group.traverse(o=>{if(o.geometry)o.geometry.dispose();}); }
  const g=new THREE.Group(); V3D.group=g;
  const r=MEH2.solve(S), ev=r.ev, st=ev.st;
  window.__ev=ev; window.__solved=r;
  const M=64, wallT=0.008;
  /* horn inner surface (single smooth print) */
  const rings=st.pts.map(p=>MEH2.seRing(p.a,p.b,st.n,M));
  const pos=[], idx=[];
  st.pts.forEach((p,i)=>{ rings[i].forEach(q=>pos.push(p.x,q[1],q[0])); });
  for(let i=0;i<st.pts.length-1;i++) for(let j=0;j<M;j++){
    const a=i*M+j, b2=i*M+(j+1)%M, c=(i+1)*M+j, d2=(i+1)*M+(j+1)%M;
    idx.push(a,c,b2, b2,c,d2);
  }
  const hg=new THREE.BufferGeometry();
  hg.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  hg.setIndex(idx); hg.computeVertexNormals();
  const horn=new THREE.Mesh(hg,new THREE.MeshPhongMaterial({color:S.style==='angular'?0xE6DFD2:0xEDEAE4,shininess:S.style==='angular'?4:14,side:THREE.DoubleSide,
    flatShading:S.style==='angular',transparent:V3D.xray,opacity:V3D.xray?0.35:1}));
  horn.userData.tag='shell'; g.add(horn);
  /* OUTER surface + mouth rim: the shell is a PRINTED SOLID with real wall thickness */
  { const wt=S.wallT||0.012;
    /* outer wall over the PRE-ROLL stations only (naive +wt offset self-intersects
       on the curling lip - caught in review); the lip closes outer edge -> roll tip */
    const pre=st.pts.filter(p=>!p.roll);
    const posO=[], idxO=[];
    const ringsO=pre.map(p=>MEH2.seRing(p.a+wt,p.b+wt,st.n,M));
    pre.forEach((p,i)=>{ ringsO[i].forEach(q=>posO.push(p.x,q[1],q[0])); });
    for(let i=0;i<pre.length-1;i++) for(let j=0;j<M;j++){
      const a2=i*M+j, b3=i*M+(j+1)%M, c2=(i+1)*M+j, d3=(i+1)*M+(j+1)%M;
      idxO.push(a2,b3,c2, b3,d3,c2); }
    const og=new THREE.BufferGeometry();
    og.setAttribute('position',new THREE.Float32BufferAttribute(posO,3));
    og.setIndex(idxO); og.computeVertexNormals();
    const outer=new THREE.Mesh(og,new THREE.MeshPhongMaterial({color:S.style==='angular'?0xDDD6C7:0xE4E0D8,shininess:S.style==='angular'?4:10,
      flatShading:S.style==='angular',transparent:V3D.xray,opacity:V3D.xray?0.25:1}));
    outer.userData.tag='shell'; g.add(outer);
    /* lip underside: outer pre-roll edge -> the roll tip ring */
    { const pl=pre[pre.length-1], tip=st.pts[st.pts.length-1];
      const ro=MEH2.seRing(pl.a+wt,pl.b+wt,st.n,M), rt=MEH2.seRing(tip.a,tip.b,st.n,M);
      const rp=[], rx=[];
      ro.forEach(q=>rp.push(pl.x,q[1],q[0])); rt.forEach(q=>rp.push(tip.x,q[1],q[0]));
      for(let j=0;j<M;j++){ const a2=j,b3=(j+1)%M,c2=M+j,d3=M+(j+1)%M; rx.push(a2,c2,b3, b3,c2,d3); }
      const rg2=new THREE.BufferGeometry();
      rg2.setAttribute('position',new THREE.Float32BufferAttribute(rp,3));
      rg2.setIndex(rx); rg2.computeVertexNormals();
      const rim=new THREE.Mesh(rg2,new THREE.MeshPhongMaterial({color:0xE0DBD1,shininess:9,side:THREE.DoubleSide}));
      rim.userData.tag='shell'; g.add(rim); }
  }
  /* apex insert: printed disc with CD bore (+ coax tap ring for 1way) */
  { const t0=st.pts[0];
    const disc=new THREE.Mesh(new THREE.CircleGeometry(Math.min(t0.a,t0.b)*0.999,48),
      new THREE.MeshPhongMaterial({color:0xD8D3C9,shininess:8,side:THREE.DoubleSide}));
    disc.rotation.y=Math.PI/2; disc.position.x=t0.x-0.001; disc.userData.tag='apex'; g.add(disc);
    const bore=new THREE.Mesh(new THREE.CircleGeometry(S.td*MEH2.IN/2,32),
      new THREE.MeshBasicMaterial({color:0x0d0c0b,side:THREE.DoubleSide}));
    bore.rotation.y=Math.PI/2; bore.position.x=t0.x-0.0005; bore.userData.tag='port'; g.add(bore);
  }
  /* drivers + printed seats + taps (slot under each driver, along flow) */
  for(const d of ev.layout){
    const n=P3(d.normal), c=P3(d.center);
    if(d.kind==='coaxtap'){
      /* pin #8: radial slot ring in the printed apex plate (Reference C look) */
      const sa=(d.slot&&d.slot.sa)||0.016, sb=(d.slot&&d.slot.sb)||0.006;
      const rad=new THREE.Vector3(0,d.center[2],d.center[1]).normalize();
      const tan=new THREE.Vector3(0,-rad.z,rad.y);
      const sp=new THREE.Shape(); const r2=0.9;
      sp.moveTo(-1+r2,-1); sp.lineTo(1-r2,-1); sp.quadraticCurveTo(1,-1,1,-1+r2);
      sp.lineTo(1,1-r2); sp.quadraticCurveTo(1,1,1-r2,1); sp.lineTo(-1+r2,1);
      sp.quadraticCurveTo(-1,1,-1,1-r2); sp.lineTo(-1,-1+r2); sp.quadraticCurveTo(-1,-1,-1+r2,-1);
      const tap=new THREE.Mesh(new THREE.ShapeGeometry(sp,8),
        new THREE.MeshBasicMaterial({color:0x0d0c0b,side:THREE.DoubleSide}));
      const mB=new THREE.Matrix4().makeBasis(rad.clone().multiplyScalar(sa),tan.clone().multiplyScalar(sb),new THREE.Vector3(1,0,0));
      mB.setPosition(new THREE.Vector3(d.center[0]-0.0008, d.center[2], d.center[1]));
      tap.applyMatrix4(mB); tap.userData.tag='port'; g.add(tap);
      continue; }
    /* stadium slot under the driver: long axis along flow */
    { const u=new THREE.Vector3(1,0,0).sub(n.clone().multiplyScalar(n.x)).normalize();  // flow dir on surface
      const v=n.clone().cross(u).normalize();
      const sa=(d.slot&&d.slot.sa)||Math.min(d.od*0.34,0.055), sb=(d.slot&&d.slot.sb)||sa/3;   // AREA-TRUE from the CR law
      const sp=new THREE.Shape(); const r2=0.9;
      sp.moveTo(-1+r2,-1); sp.lineTo(1-r2,-1); sp.quadraticCurveTo(1,-1,1,-1+r2);
      sp.lineTo(1,1-r2); sp.quadraticCurveTo(1,1,1-r2,1); sp.lineTo(-1+r2,1);
      sp.quadraticCurveTo(-1,1,-1,1-r2); sp.lineTo(-1,-1+r2); sp.quadraticCurveTo(-1,-1,-1+r2,-1);
      const tg=new THREE.ShapeGeometry(sp,8);
      const tap=new THREE.Mesh(tg,new THREE.MeshBasicMaterial({color:0x0d0c0b,side:THREE.DoubleSide}));
      const mB=new THREE.Matrix4().makeBasis(u.clone().multiplyScalar(sa),v.clone().multiplyScalar(sb),n.clone());
      mB.setPosition(c.clone().add(n.clone().multiplyScalar(-0.0015)));   // pin #3: the tap opens on the INNER face - visible through the mouth
      tap.applyMatrix4(mB); tap.userData.tag='port'; tap.userData.kind=d.kind; g.add(tap);
    }
    /* printed seat: FLUSH pad under the flange (pin #2: proud collars read as rings) */
    { const seat=new THREE.Mesh(new THREE.CylinderGeometry(d.od/2+0.004,d.od/2+0.006,0.005,40),
        new THREE.MeshPhongMaterial({color:0xE2DDD3,shininess:6}));
      seat.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),n);
      seat.position.copy(c).add(n.clone().multiplyScalar((S.wallT||0.012)+0.0025));   // slim seat ON the outer face (pin #6)
      seat.userData.tag='seat'; g.add(seat);
    }
    /* driver body: CLEAN PARAMETRIC SILHOUETTE (his call: approximate the outer
       shapes, not literal CAD). Smooth lathe from the preset's true dimensions. */
    { const body=driverBody(d.od, d.dp, (d.kind==='mid'? MPRE[S.mPre] : WPRE[S.wPre])||{});
      body.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),n);
      body.position.copy(c).add(n.clone().multiplyScalar((S.wallT||0.012)+0.004));   // flange on the outer face; tap runs through the wall
      body.traverse(o=>o.userData.tag='driver'); g.add(body);
    }
  }
  /* apex driver: 1way = the full COAX unit (his pin #8); else the CD */
  if(S.topo==='1way'){
    const body=driverBody((S.odC||0.22),(S.dpC||0.11),{motor:'ferrite'});
    body.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(-1,0,0));
    body.position.set(st.pts[0].x-0.004,0,0);
    body.traverse(o=>o.userData.tag='driver'); g.add(body);
  } else {
    const cd=new THREE.Mesh(new THREE.CylinderGeometry(0.065,0.075,S.cdDepth*MEH2.IN,28),
      new THREE.MeshPhongMaterial({color:0x8a8a88,shininess:18}));
    cd.rotation.z=Math.PI/2; cd.position.x=st.pts[0].x-S.cdDepth*MEH2.IN/2-0.004; cd.userData.tag='driver'; g.add(cd); }
  V3D.scene.add(g);
  V3D.bnd=Math.max(st.depth, st.pts[st.pts.length-1].a)*1.1;
  /* HUD rows */
  const rw=document.getElementById('rows');
  rw.innerHTML=ev.rows.map(x=>'<div class="'+x.st+'">'+(x.st==='ok'?'✓':x.st==='warn'?'△':'✗')+' '+x.name+' — '+x.val+'</div>').join('')
    +(r.infeasible?'<div class="fail">✗ INFEASIBLE at cap — change drivers or count</div>':'')
    +(r.grown>0?'<div class="warn">△ grew to '+r.S.mouthW+'&Prime; to fit</div>':'');
  document.getElementById('dims').textContent=
    (st.n<=2.4?'round':st.n>=10?'square':'squircle')+' · '+r.S.mouthW+'″ mouth · '+(st.depth/MEH2.IN).toFixed(1)+'″ deep · XO '
    +(S.topo==='3way'&&r.S.fxDerived?r.S.fxDerived.hi+' / ':'')+(r.S.fxDerived?r.S.fxDerived.lo:'—')+' Hz';
  if(window.BUGPINS)BUGPINS.redraw();
  drawResponse(r);
  render3d();
}
function drawResponse(r){
  const cv=document.getElementById('respChart'); if(!cv) return;
  const ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  let R; try{ R=MEH2.response(r.S, r.ev); }catch(e){ return; }
  const F0=100,F1=16000, X=f=>40+(W-52)*Math.log(f/F0)/Math.log(F1/F0);
  const dB0=6, dB1=-42, Y=v=>10+(H-32)*(dB0-Math.max(dB1,Math.min(dB0,v)))/(dB0-dB1);
  ctx.strokeStyle='#F0F0F0'; ctx.lineWidth=1; ctx.font='8px ui-monospace,monospace'; ctx.fillStyle='#A6A6A6';
  for(const fq of [100,200,500,1000,2000,5000,10000]){ const x=X(fq);
    ctx.beginPath(); ctx.moveTo(x,10); ctx.lineTo(x,H-22); ctx.stroke();
    ctx.fillText(fq>=1000?(fq/1000)+'k':fq, x-8, H-10); }
  for(const db of [0,-12,-24,-36]){ const y=Y(db);
    ctx.strokeStyle=db===0?'#E2E2E2':'#F0F0F0';
    ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(W-12,y); ctx.stroke();
    ctx.fillText(db, 14, y+3); }
  const plot=(arr,style,wd,dash)=>{ if(!arr) return;
    ctx.strokeStyle=style; ctx.lineWidth=wd; ctx.setLineDash(dash||[]);
    ctx.beginPath();
    arr.forEach((v,i)=>{ const x=X(R.f[i]), y=Y(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.stroke(); ctx.setLineDash([]); };
  plot(R.hf,  '#B9B6B0',1,[3,3]);
  plot(R.mid, '#8a877f',1,[3,3]);
  plot(R.woof,'#6b6963',1,[3,3]);
  plot(R.sum, '#1C1C1C',1.6);
  for(const fx of [R.fxHi, R.fxLo]){ if(!fx||fx<F0||fx>F1) continue;
    const x=X(fx); ctx.strokeStyle='#E2E2E2'; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(x,10); ctx.lineTo(x,H-22); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillText('XO '+fx, x+3, 18); }
  ctx.fillStyle='#1C1C1C'; ctx.fillText('sum', W-40, 16);
  ctx.fillStyle='#8a877f'; ctx.fillText('sections', W-90, 16);
}
/* ---------------- UI wiring ---------------- */
function save(){ try{ localStorage.setItem('meh5_state',JSON.stringify(S)); }catch(e){} }
function wire(){
  document.querySelectorAll('#segTopo button').forEach(b=>{
    if(b.dataset.v===S.topo){document.querySelectorAll('#segTopo button').forEach(x=>x.classList.remove('on'));b.classList.add('on');}
    b.onclick=()=>{ S.topo=b.dataset.v;
      document.querySelectorAll('#segTopo button').forEach(x=>x.classList.toggle('on',x===b));
      document.getElementById('midCtl').style.display=S.topo==='3way'?'':'none';
      save(); rebuild(); };
  });
  document.getElementById('midCtl').style.display=S.topo==='3way'?'':'none';
  const bind=(id,key,fmt)=>{ const el=document.getElementById(id);
    el.value=S[key];
    const show=()=>{ const v=document.getElementById('v'+id.charAt(0).toUpperCase()+id.slice(1));
      if(v)v.textContent=fmt?fmt(S[key]):S[key]; };
    show();
    el.oninput=()=>{ S[key]=+el.value;
      if(key==='odW'){S.dpW=S.odW*0.5; S.wPre='custom'; const p=document.getElementById('wPre'); if(p)p.value='custom';}
      if(key==='odM'){S.dpM=S.odM*0.6; S.mPre='custom'; const p=document.getElementById('mPre'); if(p)p.value='custom';}
      show(); save(); rebuild(); }; };
  bind('seN','seN',v=>v<=2.4?'round':v>=10?'square':('n='+v));
  bind('mouthW','mouthW',v=>v+'″'); bind('covH','covH',v=>v+'°'); bind('covV','covV',v=>v+'°');
  bind('rollR','rollR',v=>v+'″');
  { const el=document.getElementById('wallmm'); el.value=Math.round((S.wallT||0.012)*1000);
    const show=()=>{ document.getElementById('vWall').textContent=Math.round(S.wallT*1000)+' mm'; }; show();
    el.oninput=()=>{ S.wallT=(+el.value)/1000; show(); save(); rebuild(); }; } bind('odW','odW',v=>v+' cm'); bind('nW','nW');
  bind('odM','odM',v=>v+' cm'); bind('nM','nM');
  const fillPre=(id,tbl,cur)=>{ const el=document.getElementById(id);
    el.innerHTML=Object.keys(tbl).map(k=>'<option value="'+k+'">'+tbl[k].name+'</option>').join('')+'<option value="custom">custom (sliders)</option>';
    el.value=cur; };
  fillPre('wPre',WPRE,S.wPre); fillPre('mPre',MPRE,S.mPre);
  document.getElementById('wPre').onchange=e=>{ S.wPre=e.target.value;
    const P=WPRE[S.wPre]; if(P){ S.odW=P.od; S.dpW=P.dp; S.sdW=P.sd; S.vtcW=P.vtc; S.xmW=P.xm; document.getElementById('odW').value=S.odW; }
    save(); rebuild(); };
  document.getElementById('mPre').onchange=e=>{ S.mPre=e.target.value;
    const P=MPRE[S.mPre]; if(P){ S.odM=P.od; S.dpM=P.dp; S.sdM=P.sd; S.vtcM=P.vtc; S.xmM=P.xm; document.getElementById('odM').value=S.odM; }
    save(); rebuild(); };
  document.querySelectorAll('#segStyle button').forEach(b=>{
    if(b.dataset.v===S.style){document.querySelectorAll('#segStyle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');}
    b.onclick=()=>{ S.style=b.dataset.v;
      document.querySelectorAll('#segStyle button').forEach(x=>x.classList.toggle('on',x===b));
      save(); rebuild(); }; });
  const CDP={de500:{td:1.0,floor:900,dep:1.2}, de900:{td:1.4,floor:550,dep:1.7}, dcx464:{td:1.4,floor:300,dep:2.4}};
  document.getElementById('cdSel').value=S.cdSel||'de900';
  document.getElementById('cdSel').onchange=e=>{ S.cdSel=e.target.value; const P=CDP[S.cdSel];
    S.td=P.td; S.throat=P.td; S.cdFloor=P.floor; S.cdDepth=P.dep; save(); rebuild(); };
  { const P=CDP[S.cdSel||'de900']; S.td=P.td; S.throat=P.td; S.cdFloor=P.floor; S.cdDepth=P.dep; }
  document.getElementById('bXray').onclick=()=>{ V3D.xray=!V3D.xray; rebuild(); };
}
/* ---------------- bug pins (proven v3 module; bare-scope safe) ---------------- */
window.BUGPINS=(function(){
  const KEY='meh5_bugpins';
  let pins=[]; try{ pins=JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){}
  const saveP=()=>{ try{ localStorage.setItem(KEY,JSON.stringify(pins)); }catch(e){} };
  let grp=null, prov=null;
  const redraw=()=>{ if(typeof V3D==='undefined'||!V3D.scene) return;
    if(grp)V3D.scene.remove(grp);
    grp=new THREE.Group(); grp.userData.tag='bugpin';
    for(const p of pins){ if(p.done) continue;
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.012,12,10),
        new THREE.MeshBasicMaterial({color:0xFF2D00,depthTest:false}));
      m.renderOrder=999; m.position.set(p.p[0],p.p[2],p.p[1]); m.userData.tag='bugpin'; grp.add(m); }
    V3D.scene.add(grp); render3d(); };
  const clearProv=()=>{ if(prov){ V3D.scene.remove(prov); prov=null; render3d(); } };
  const drop=(e)=>{
    const cv=V3D.renderer.domElement, r=cv.getBoundingClientRect();
    const nd=new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1);
    const rc=new THREE.Raycaster(); rc.setFromCamera(nd,V3D.camera);
    const hits=rc.intersectObjects(V3D.scene.children,true).filter(h=>h.object.isMesh&&h.object.userData.tag!=='bugpin'&&!(h.object.material&&h.object.material.transparent));
    if(!hits.length) return false;
    const hp=hits[0].point, pt=[hp.x,hp.z,hp.y];
    clearProv();
    prov=new THREE.Mesh(new THREE.SphereGeometry(0.012,12,10),new THREE.MeshBasicMaterial({color:0xFF2D00,depthTest:false}));
    prov.renderOrder=999; prov.userData.tag='bugpin'; prov.position.copy(hp); V3D.scene.add(prov); render3d();
    const old=document.getElementById('bugpin-ui'); if(old)old.remove();
    const dv=document.createElement('div'); dv.id='bugpin-ui';
    dv.style.cssText='position:fixed;left:'+Math.min(e.clientX+14,innerWidth-330)+'px;top:'+Math.min(e.clientY-10,innerHeight-100)+'px;z-index:9999;background:#1c1b19;border:2px solid #FF2D00;padding:9px;border-radius:5px';
    dv.innerHTML='<div style="color:#FF2D00;font:700 11px monospace;margin-bottom:6px">● BUG PIN — describe what is wrong</div><input id="bugpin-txt" style="width:290px;background:#0f0e0d;color:#eee;border:1px solid #666;padding:6px;font:12px monospace"><div style="margin-top:7px;text-align:right"><button id="bugpin-ok" style="background:#FF2D00;color:#fff;border:0;padding:5px 14px;font:700 11px monospace;cursor:pointer">SAVE PIN</button> <button id="bugpin-no" style="background:#333;color:#aaa;border:0;padding:5px 9px;font:11px monospace;cursor:pointer">cancel</button></div>';
    document.body.appendChild(dv);
    const txt=document.getElementById('bugpin-txt'); txt.focus();
    const fin=(ok)=>{ if(ok&&txt.value.trim()){
        const id=(pins.reduce((a,b)=>Math.max(a,b.id),0)|0)+1;
        pins.push({id,p:pt,note:txt.value.trim(),build:window.MEH_BUILD,topo:S.topo,
          cam:{yaw:V3D.yaw,pitch:V3D.pitch,dist:V3D.dist},state:JSON.parse(JSON.stringify(S)),t:new Date().toISOString(),done:false});
        saveP(); clearProv(); redraw();
        document.getElementById('note').textContent='bug pin #'+id+' saved — the agent can see it';
      } else clearProv();
      dv.remove(); };
    document.getElementById('bugpin-ok').onclick=()=>fin(true);
    document.getElementById('bugpin-no').onclick=()=>fin(false);
    txt.onkeydown=(ev2)=>{ if(ev2.key==='Enter')fin(true); if(ev2.key==='Escape')fin(false); };
    return true; };
  const arm=(on)=>{ window.__pinMode=on;
    const b=document.getElementById('bPin');
    if(b){ b.textContent=on?'CLICK THE MODEL…':'PIN A BUG'; b.style.background=on?'#FF2D00':''; b.style.color=on?'#fff':''; }
    if(typeof V3D!=='undefined'&&V3D.renderer)V3D.renderer.domElement.style.cursor=on?'crosshair':''; };
  const hook=()=>{ const b=document.getElementById('bPin'); if(b)b.onclick=()=>arm(!window.__pinMode); };
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',hook); else hook();
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&window.__pinMode)arm(false); });
  const onCv=(e)=>{ const host=document.getElementById('v3d');
    return e.target&&e.target.tagName==='CANVAS'&&host&&host.contains(e.target); };
  document.addEventListener('click',(e)=>{
    if(!window.__pinMode||typeof V3D==='undefined'||!V3D.renderer) return;
    if(!onCv(e)) return;
    e.preventDefault(); e.stopPropagation();
    if(drop(e))arm(false); },true);
  return { list:()=>pins, open:()=>pins.filter(p=>!p.done), redraw, arm,
    fly:(id)=>{ const p=pins.find(q=>q.id===id); if(!p)return false;
      if(p.cam){V3D.yaw=p.cam.yaw;V3D.pitch=p.cam.pitch;V3D.dist=Math.min(p.cam.dist,1.2);}
      V3D.tgt.set(p.p[0],p.p[2],p.p[1]); render3d(); return p; },
    resolve:(id,note)=>{ const p=pins.find(q=>q.id===id); if(p){p.done=true;p.fix=note||'';saveP();redraw();} },
    clear:()=>{ pins=[]; saveP(); redraw(); } };
})();
/* ---------------- boot ---------------- */
init3d(); wire(); rebuild();
</script>
